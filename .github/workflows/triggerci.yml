name: CI

on:
  push:
    branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]


permissions:
  contents: read
  security-events: write

jobs:

  security-tests:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install

      - name: Run Unit tests
        run: npm test
      
      - name: SAST CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript'
      
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        
      - name: Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
  
  build:

    needs: security-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t juedra11/prueba-next:${{github.sha}} .
          docker push juedra11/prueba-next:${{github.sha}}


      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: 'juedra11/prueba-next:${{github.sha}}'

      - name: push image to registry
        run: |
          docker tag juedra11/prueba-next:${{github.sha}} juedra11/prueba-next:${{github.sha}}
          docker push juedra11/prueba-next:${{github.sha}}
    
  dast:

    needs: security-tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install

      - name: Fix permission for ZAP
        run: sudo chmod -R 777 ${{ github.workspace }}

      - name: Start Application
        run: | 
          npm run start &
          sleep 10
      
      - name: Verify app is running
        run: curl http://localhost:3000

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'