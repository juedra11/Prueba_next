name: CI

on:
  push:
    branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]


permissions:
  contents: read

jobs:

  Test_and_build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install

      - name: Run tests
        run: npm test
