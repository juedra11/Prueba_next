apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: prueba-next
  namespace: argocd

spec:
  project: default

  source:
    repoURL: 'https://github.com/juedra11/Prueba_next.git'
    targetRevision: main
    path: helm
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true